<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTI</title>
<style>
  :root { --mti-black: #001e40; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #001e40; font-family: -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif; }

  #stage { position: absolute; inset: 0; background: #fff; overflow: hidden; }

  #galaxy { position: absolute; inset: 0; z-index: 3; overflow: hidden; clip-path: circle(0 at 64% 37%); }
  #galaxyImg { position: absolute; user-select: none; pointer-events: none; }
  #blue { position: absolute; inset: 0; background: #123f80; opacity: 0; mix-blend-mode: multiply; }

  #mtiBlack { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: var(--mti-black); z-index: 2; }
  #star { position: absolute; border-radius: 50%; background: #fff; z-index: 4; }

  #copy { position: absolute; left: 0; right: 0; text-align: center; z-index: 5; line-height: 0; }
  #logoWrap { display: inline-block; overflow: hidden; line-height: 0; }
  #logo { display: block; height: 50px; }
  #tagWrap { overflow: hidden; margin-top: 56px; }
  #tagline { display: inline-block; height: 25px; }
</style>
</head>
<body>
  <div id="stage">
    <div id="galaxy">
      <img id="galaxyImg" src="galaxy.jpg" alt="">
      <div id="blue"></div>
    </div>
    <div id="mtiBlack"><div id="star"></div></div>
    <div id="copy">
      <div id="logoWrap"><img id="logo" src="logo.svg" alt="MTI"></div>
      <div id="tagWrap"><img id="tagline" src="tagline.svg" alt="Make Tomorrow Illuminated."></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    (function () {
      const stage = document.getElementById('stage');
      const mti = document.getElementById('mtiBlack');
      const star = document.getElementById('star');
      const galaxy = document.getElementById('galaxy');
      const galaxyImg = document.getElementById('galaxyImg');
      const blue = document.getElementById('blue');
      const logo = document.getElementById('logo');
      const tag = document.getElementById('tagline');
      const copy = document.getElementById('copy');

      const NAT = { w: 1893, h: 831 };
      const CORE = { x: 0.505, y: 0.509 };
      const AX = 0.64, AY = 0.37;
      const SX = 0.7143, SY = 0.2849;

      let tl;

      function placeGalaxy(W, H, anchorX, anchorY) {
        const scale = Math.max(
          (anchorX * W) / (CORE.x * NAT.w),
          ((1 - anchorX) * W) / ((1 - CORE.x) * NAT.w),
          (anchorY * H) / (CORE.y * NAT.h),
          ((1 - anchorY) * H) / ((1 - CORE.y) * NAT.h)
        ) * 1.03;
        const w = NAT.w * scale, h = NAT.h * scale;
        gsap.set(galaxyImg, { width: w, height: h, left: anchorX * W - CORE.x * w, top: anchorY * H - CORE.y * h });
      }

      function makeOrbit(dir, frac) {
        const state = { p: 0 };
        const rampIn = 0.34, rampOut = 0.4;
        const smooth = t => t * t * (3 - 2 * t);
        function update() {
          const p = state.p;
          const env = p < rampIn ? smooth(p / rampIn)
            : p > 1 - rampOut ? smooth((1 - p) / rampOut)
            : 1;
          const radius = mti.getBoundingClientRect().width * frac * env;
          const angle = dir * 1.6 * Math.PI * p;
          gsap.set(star, { x: radius * Math.cos(angle), y: radius * Math.sin(angle) });
        }
        return { state, update };
      }

      function build() {
        if (tl) tl.kill();

        const W = stage.clientWidth, H = stage.clientHeight;
        const cover = Math.max(W, H);
        const mark = Math.min(W, H) * 0.2;
        const starSize = mark * 0.1664;
        const revealRadius = Math.hypot(W, H) * 1.2;

        const anchorX = ((W - cover) / 2 + AX * cover) / W;
        const anchorY = ((H - cover) / 2 + AY * cover) / H;

        const square = H * 0.78;
        const insetV = (H - square) / 2 / H * 100;
        const insetH = (W - square) / 2 / W * 100;

        placeGalaxy(W, H, anchorX, anchorY);

        gsap.set(mti, { width: cover, height: cover });
        gsap.set(star, { opacity: 0, x: 0, y: 0, left: (AX * 100) + '%', top: (AY * 100) + '%', width: starSize, height: starSize, marginLeft: -starSize / 2, marginTop: -starSize / 2 });
        gsap.set(galaxy, { clipPath: 'circle(0px at ' + anchorX * 100 + '% ' + anchorY * 100 + '%)' });
        gsap.set(blue, { opacity: 0 });
        gsap.set(logo, { yPercent: 100 });
        gsap.set(tag, { yPercent: 110 });
        gsap.set(copy, { top: (H / 2 + mark / 2 + 20) + 'px' });

        const shrinkSpin = makeOrbit(1, 0.3);
        const growSpin = makeOrbit(-1, 0.3);
        const reveal = { r: 0 };
        const crop = { t: 0 };

        tl = gsap.timeline({ defaults: { ease: 'power2.inOut' } });

        tl.to(star, { opacity: 1, duration: 0.5 }, 0.3);

        tl.to(mti, { width: mark, height: mark, duration: 1.3, ease: 'power3.inOut' }, 1.0);
        tl.to(star, { left: (SX * 100) + '%', top: (SY * 100) + '%', duration: 1.3, ease: 'power2.inOut' }, 1.0);
        tl.to(shrinkSpin.state, { p: 1, duration: 1.6, ease: 'sine.inOut', onUpdate: shrinkSpin.update }, 0.95);

        tl.to(logo, { yPercent: 0, duration: 0.6, ease: 'power3.out' }, 2.7);
        tl.to(tag, { yPercent: 0, duration: 0.7, ease: 'power3.out' }, 3.55);
        tl.to([logo, tag], { opacity: 0, duration: 0.5 }, 4.8);

        tl.to(mti, { width: cover, height: cover, duration: 1.35, ease: 'power2.inOut' }, 5.2);
        tl.to(star, { left: (AX * 100) + '%', top: (AY * 100) + '%', duration: 1.0, ease: 'power2.inOut' }, 5.2);
        tl.to(growSpin.state, { p: 1, duration: 1.4, ease: 'sine.inOut', onUpdate: growSpin.update }, 5.15);

        tl.to(star, { opacity: 0, duration: 0.55, ease: 'power1.inOut' }, 6.6);

        const revealStart = 6.65, revealDuration = 1.25;
        tl.to(reveal, {
          r: revealRadius, duration: revealDuration, ease: 'power2.inOut',
          onUpdate() { galaxy.style.clipPath = 'circle(' + reveal.r + 'px at ' + anchorX * 100 + '% ' + anchorY * 100 + '%)'; }
        }, revealStart);
        tl.set(galaxy, { clipPath: 'inset(0px)' }, revealStart + revealDuration);

        const finish = revealStart + revealDuration + 0.15;
        tl.to(blue, { opacity: 0.6, duration: 0.95 }, finish);
        tl.to(crop, {
          t: 1, duration: 0.95, ease: 'power2.inOut',
          onUpdate() { galaxy.style.clipPath = 'inset(' + insetV * crop.t + '% ' + insetH * crop.t + '%)'; }
        }, finish);
      }

      build();

      let builtWidth = stage.clientWidth;
      window.addEventListener('load', function () {
        if (stage.clientWidth && stage.clientWidth !== builtWidth) {
          builtWidth = stage.clientWidth;
          build();
        }
      });

      let resizeTimer;
      window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          if (!stage.clientWidth || stage.clientWidth === builtWidth) return;
          builtWidth = stage.clientWidth;
          const progress = tl ? tl.progress() : 0;
          build();
          tl.progress(progress);
        }, 150);
      });
    })();
  </script>
</body>
</html>
